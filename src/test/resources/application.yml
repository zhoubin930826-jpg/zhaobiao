spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 40MB

app:
  jwt:
    secret: TestJwtSecretTestJwtSecretTestJwt
    expire-seconds: 7200
  bootstrap:
    admin-password: adminqwert
  file:
    type: local
    storage-path: ./.test-uploads/files
    temp-path: ./.test-uploads/tmp

logging:
  level:
    root: warn
