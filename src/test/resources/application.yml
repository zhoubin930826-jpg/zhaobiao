spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_TEST_DB:zhaobiao_admin_test}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  sql:
    init:
      mode: always
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 40MB

app:
  jwt:
    secret: TestJwtSecretTestJwtSecretTestJwt
    expire-seconds: 7200
  bootstrap:
    admin-password: adminqwert
  file:
    type: local
    storage-path: ./.test-uploads/files
    temp-path: ./.test-uploads/tmp

logging:
  level:
    root: warn
