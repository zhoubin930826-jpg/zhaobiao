server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:zhaobiao_admin}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

app:
  jwt:
    secret: ${APP_JWT_SECRET:}
    expire-seconds: 7200
  bootstrap:
    admin-password: ${APP_BOOTSTRAP_ADMIN_PASSWORD:}
  file:
    storage-path: ${APP_FILE_STORAGE_PATH:./.uploads/files}
    temp-path: ${APP_FILE_TEMP_PATH:./.uploads/tmp}

logging:
  level:
    org.hibernate.SQL: warn
